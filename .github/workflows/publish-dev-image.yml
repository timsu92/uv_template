name: Publish devcontainer image

on:
  push:
    branches:
      - "main"
    paths:
      - ".devcontainer/**"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/publish-dev-image.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/publish-dev-image.yml"
  workflow_dispatch:
  schedule:
    # Sunday 03:00 Asia/Taipei = Saturday 19:00 UTC
    - cron: "0 19 * * 6"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-dev-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/timsu92/uv_template
  DOTENV_REPO: https://github.com/timsu92/env_setup.git

jobs:
  build-dev-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push image
        id: push_flag
        run: |
          if [ "${{ github.repository }}" = "timsu92/uv_template" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.push_flag.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Resolve env_setup ref
        id: env_setup
        run: |
          set -eu
          REF_SHA=$(git ls-remote ${{ env.DOTENV_REPO }} refs/heads/main | awk '{print $1}')
          if [ -z "$REF_SHA" ]; then
            echo "Failed to resolve env_setup main SHA" >&2
            exit 1
          fi
          echo "ref_sha=$REF_SHA" >> "$GITHUB_OUTPUT"

      - name: Build (and optionally push) dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: dev
          push: ${{ steps.push_flag.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PROJECT_PATH=/project
            TZ=Asia/Taipei
            ENV_SETUP_REPO=${{ env.DOTENV_REPO }}
            ENV_SETUP_REF=${{ steps.env_setup.outputs.ref_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
